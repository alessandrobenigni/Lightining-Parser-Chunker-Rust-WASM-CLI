<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350" width="600" height="350" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#f0f0f5"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="350" rx="8" fill="url(#bg3)" stroke="#e2e2e8" stroke-width="1"/>

  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#18181b">Worker Scaling (1,000 files)</text>
  <text x="300" y="48" text-anchor="middle" font-size="11" fill="#71717a">Mixed document corpus, by-structure chunking</text>

  <!-- Chart area: x=70..560, y=70..290 -->
  <!-- X: 5 points at workers 1,2,4,8,16 => evenly spaced at x = 70, 192.5, 315, 437.5, 560 -->
  <!-- Y: 0 to 16000 => 220px => 1 unit = 0.01375px -->

  <!-- Y gridlines -->
  <line x1="70" y1="290" x2="560" y2="290" stroke="#e4e4e7" stroke-width="0.5"/>
  <text x="62" y="294" text-anchor="end" font-size="10" fill="#71717a">0</text>

  <line x1="70" y1="252.5" x2="560" y2="252.5" stroke="#e4e4e7" stroke-width="0.5" stroke-dasharray="4,4"/>
  <text x="62" y="256" text-anchor="end" font-size="10" fill="#71717a">4K</text>

  <line x1="70" y1="215" x2="560" y2="215" stroke="#e4e4e7" stroke-width="0.5" stroke-dasharray="4,4"/>
  <text x="62" y="219" text-anchor="end" font-size="10" fill="#71717a">8K</text>

  <line x1="70" y1="177.5" x2="560" y2="177.5" stroke="#e4e4e7" stroke-width="0.5" stroke-dasharray="4,4"/>
  <text x="62" y="181" text-anchor="end" font-size="10" fill="#71717a">12K</text>

  <line x1="70" y1="140" x2="560" y2="140" stroke="#e4e4e7" stroke-width="0.5" stroke-dasharray="4,4"/>
  <text x="62" y="144" text-anchor="end" font-size="10" fill="#71717a">16K</text>

  <!-- X axis labels -->
  <text x="70" y="308" text-anchor="middle" font-size="10" fill="#71717a">1</text>
  <text x="192.5" y="308" text-anchor="middle" font-size="10" fill="#71717a">2</text>
  <text x="315" y="308" text-anchor="middle" font-size="10" fill="#71717a">4</text>
  <text x="437.5" y="308" text-anchor="middle" font-size="10" fill="#71717a">8</text>
  <text x="560" y="308" text-anchor="middle" font-size="10" fill="#71717a">16</text>
  <text x="315" y="328" text-anchor="middle" font-size="11" fill="#71717a">Workers</text>

  <!-- Y axis label -->
  <text x="16" y="180" text-anchor="middle" font-size="11" fill="#71717a" transform="rotate(-90, 16, 180)">files/sec</text>

  <!-- Data points (workers: throughput):
       1: 7642  => y = 290 - (7642/16000)*220 = 290 - 105.1 = 184.9
       2: 10072 => y = 290 - (10072/16000)*220 = 290 - 138.5 = 151.5
       4: 12250 => y = 290 - (12250/16000)*220 = 290 - 168.4 = 121.6
       8: 13402 => y = 290 - (13402/16000)*220 = 290 - 184.3 = 105.7
      16: 14099 => y = 290 - (14099/16000)*220 = 290 - 193.9 = 96.1
  -->

  <!-- Area fill -->
  <path d="M70,184.9 L192.5,151.5 L315,121.6 L437.5,105.7 L560,96.1 L560,290 L70,290 Z" fill="url(#areaGrad)"/>

  <!-- Line -->
  <polyline points="70,184.9 192.5,151.5 315,121.6 437.5,105.7 560,96.1" fill="none" stroke="url(#lineGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Data points -->
  <circle cx="70" cy="184.9" r="5" fill="white" stroke="#6366f1" stroke-width="2"/>
  <text x="70" y="176" text-anchor="middle" font-size="10" font-weight="600" fill="#6366f1">7,642</text>

  <circle cx="192.5" cy="151.5" r="5" fill="white" stroke="#6366f1" stroke-width="2"/>
  <text x="192.5" y="143" text-anchor="middle" font-size="10" font-weight="600" fill="#6366f1">10,072</text>

  <circle cx="315" cy="121.6" r="5" fill="white" stroke="#6366f1" stroke-width="2"/>
  <text x="315" y="113" text-anchor="middle" font-size="10" font-weight="600" fill="#6366f1">12,250</text>

  <circle cx="437.5" cy="105.7" r="5" fill="white" stroke="#6366f1" stroke-width="2"/>
  <text x="437.5" y="97" text-anchor="middle" font-size="10" font-weight="600" fill="#6366f1">13,402</text>

  <circle cx="560" cy="96.1" r="5" fill="white" stroke="#6366f1" stroke-width="2"/>
  <text x="560" y="88" text-anchor="middle" font-size="10" font-weight="600" fill="#6366f1">14,099</text>

  <!-- Axes -->
  <line x1="70" y1="290" x2="560" y2="290" stroke="#71717a" stroke-width="1"/>
  <line x1="70" y1="70" x2="70" y2="290" stroke="#71717a" stroke-width="1"/>

  <!-- Near-linear annotation -->
  <text x="400" y="78" text-anchor="middle" font-size="10" fill="#a1a1aa">1.85x scaling at 16 workers</text>
</svg>
