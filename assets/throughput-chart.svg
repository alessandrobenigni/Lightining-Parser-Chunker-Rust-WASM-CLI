<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="100%" stop-color="#f0f0f5"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" rx="8" fill="url(#bg)" stroke="#e2e2e8" stroke-width="1"/>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#18181b">Document Parsing Throughput (files/sec)</text>

  <!-- Legend -->
  <rect x="220" y="48" width="12" height="12" rx="2" fill="#6366f1"/>
  <text x="237" y="58" font-size="11" fill="#3f3f46">Parser Chunker</text>
  <rect x="340" y="48" width="12" height="12" rx="2" fill="#ef4444"/>
  <text x="357" y="58" font-size="11" fill="#3f3f46">Unstructured</text>
  <rect x="450" y="48" width="12" height="12" rx="2" fill="#f59e0b"/>
  <text x="467" y="58" font-size="11" fill="#3f3f46">Docling</text>
  <rect x="530" y="48" width="12" height="12" rx="2" fill="#10b981"/>
  <text x="547" y="58" font-size="11" fill="#3f3f46">LangChain</text>

  <!-- Chart area: x=80..760, y=80..390 -->
  <!-- Y-axis gridlines and labels -->
  <line x1="80" y1="390" x2="760" y2="390" stroke="#e4e4e7" stroke-width="0.5"/>
  <text x="72" y="394" text-anchor="end" font-size="10" fill="#71717a">0</text>

  <line x1="80" y1="328" x2="760" y2="328" stroke="#e4e4e7" stroke-width="0.5"/>
  <text x="72" y="332" text-anchor="end" font-size="10" fill="#71717a">500</text>

  <line x1="80" y1="266" x2="760" y2="266" stroke="#e4e4e7" stroke-width="0.5"/>
  <text x="72" y="270" text-anchor="end" font-size="10" fill="#71717a">1,000</text>

  <line x1="80" y1="204" x2="760" y2="204" stroke="#e4e4e7" stroke-width="0.5"/>
  <text x="72" y="208" text-anchor="end" font-size="10" fill="#71717a">1,500</text>

  <line x1="80" y1="142" x2="760" y2="142" stroke="#e4e4e7" stroke-width="0.5"/>
  <text x="72" y="146" text-anchor="end" font-size="10" fill="#71717a">2,000</text>

  <line x1="80" y1="80" x2="760" y2="80" stroke="#e4e4e7" stroke-width="0.5"/>
  <text x="72" y="84" text-anchor="end" font-size="10" fill="#71717a">2,500</text>

  <!-- Scale: 310px for 2500 files/sec => 1 file/sec = 0.124px -->
  <!-- Each group: 170px wide, 4 bars of 30px with 10px gap -->
  <!-- Group 1: Medium TXT (center at 165) -->
  <text x="165" y="410" text-anchor="middle" font-size="11" font-weight="600" fill="#3f3f46">Med TXT</text>
  <!-- Parser Chunker: 2610 => 323.6px -->
  <rect x="95" y="66.4" width="30" height="323.6" rx="2" fill="#6366f1" opacity="0.9"/>
  <text x="110" y="62" text-anchor="middle" font-size="9" font-weight="600" fill="#6366f1">2,610</text>
  <!-- Unstructured: 8.3 => 1px (min visible) -->
  <rect x="135" y="389" width="30" height="1" rx="2" fill="#ef4444" opacity="0.9"/>
  <text x="150" y="385" text-anchor="middle" font-size="9" fill="#ef4444">8.3</text>
  <!-- Docling: N/A -->
  <text x="190" y="385" text-anchor="middle" font-size="8" fill="#a1a1aa">N/A</text>
  <!-- LangChain: 867 => 107.5px -->
  <rect x="215" y="282.5" width="30" height="107.5" rx="2" fill="#10b981" opacity="0.9"/>
  <text x="230" y="278" text-anchor="middle" font-size="9" fill="#10b981">867</text>

  <!-- Group 2: Medium HTML (center at 335) -->
  <text x="335" y="410" text-anchor="middle" font-size="11" font-weight="600" fill="#3f3f46">Med HTML</text>
  <!-- Parser Chunker: 2789 => 345.8px -->
  <rect x="265" y="44.2" width="30" height="345.8" rx="2" fill="#6366f1" opacity="0.9"/>
  <text x="280" y="40" text-anchor="middle" font-size="9" font-weight="600" fill="#6366f1">2,789</text>
  <!-- Unstructured: 16.1 => 2px -->
  <rect x="305" y="388" width="30" height="2" rx="2" fill="#ef4444" opacity="0.9"/>
  <text x="320" y="383" text-anchor="middle" font-size="9" fill="#ef4444">16.1</text>
  <!-- Docling: 28.7 => 3.6px -->
  <rect x="345" y="386.4" width="30" height="3.6" rx="2" fill="#f59e0b" opacity="0.9"/>
  <text x="360" y="382" text-anchor="middle" font-size="9" fill="#f59e0b">28.7</text>
  <!-- LangChain: 1717 => 212.9px -->
  <rect x="385" y="177.1" width="30" height="212.9" rx="2" fill="#10b981" opacity="0.9"/>
  <text x="400" y="173" text-anchor="middle" font-size="9" fill="#10b981">1,717</text>

  <!-- Group 3: Large TXT (center at 505) -->
  <text x="505" y="410" text-anchor="middle" font-size="11" font-weight="600" fill="#3f3f46">Large TXT</text>
  <!-- Parser Chunker: 566 => 70.2px -->
  <rect x="435" y="319.8" width="30" height="70.2" rx="2" fill="#6366f1" opacity="0.9"/>
  <text x="450" y="315" text-anchor="middle" font-size="9" font-weight="600" fill="#6366f1">566</text>
  <!-- Unstructured: 0.9 => 1px -->
  <rect x="475" y="389" width="30" height="1" rx="2" fill="#ef4444" opacity="0.9"/>
  <text x="490" y="385" text-anchor="middle" font-size="9" fill="#ef4444">0.9</text>
  <!-- Docling: N/A -->
  <text x="530" y="385" text-anchor="middle" font-size="8" fill="#a1a1aa">N/A</text>
  <!-- LangChain: 101 => 12.5px -->
  <rect x="555" y="377.5" width="30" height="12.5" rx="2" fill="#10b981" opacity="0.9"/>
  <text x="570" y="373" text-anchor="middle" font-size="9" fill="#10b981">101</text>

  <!-- Group 4: Large HTML (center at 675) -->
  <text x="675" y="410" text-anchor="middle" font-size="11" font-weight="600" fill="#3f3f46">Large HTML</text>
  <!-- Parser Chunker: 589 => 73.1px -->
  <rect x="605" y="316.9" width="30" height="73.1" rx="2" fill="#6366f1" opacity="0.9"/>
  <text x="620" y="312" text-anchor="middle" font-size="9" font-weight="600" fill="#6366f1">589</text>
  <!-- Unstructured: 2.0 => 1px -->
  <rect x="645" y="389" width="30" height="1" rx="2" fill="#ef4444" opacity="0.9"/>
  <text x="660" y="385" text-anchor="middle" font-size="9" fill="#ef4444">2.0</text>
  <!-- Docling: 3.7 => 1px -->
  <rect x="685" y="389" width="30" height="1" rx="2" fill="#f59e0b" opacity="0.9"/>
  <text x="700" y="385" text-anchor="middle" font-size="9" fill="#f59e0b">3.7</text>
  <!-- LangChain: 134 => 16.6px -->
  <rect x="725" y="373.4" width="30" height="16.6" rx="2" fill="#10b981" opacity="0.9"/>
  <text x="740" y="369" text-anchor="middle" font-size="9" fill="#10b981">134</text>

  <!-- Axes -->
  <line x1="80" y1="390" x2="760" y2="390" stroke="#71717a" stroke-width="1"/>
  <line x1="80" y1="80" x2="80" y2="390" stroke="#71717a" stroke-width="1"/>

  <!-- Y-axis label -->
  <text x="20" y="235" text-anchor="middle" font-size="11" fill="#71717a" transform="rotate(-90, 20, 235)">files/sec</text>

  <!-- Footer note -->
  <text x="400" y="440" text-anchor="middle" font-size="9" fill="#a1a1aa">Single-threaded, format-specific benchmarks. N/A = tool does not support format natively.</text>
</svg>
