name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
            archive: zip
          - target: x86_64-apple-darwin
            os: macos-13
            cross: false
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-14
            cross: false
            archive: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build release (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          VERSION="${GITHUB_REF_NAME}"
          bash scripts/package.sh "$VERSION" "${{ matrix.target }}" "target/${{ matrix.target }}/release/parser-chunker"

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          bash scripts/package.sh "$VERSION" "${{ matrix.target }}" "target/${{ matrix.target }}/release/parser-chunker.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: parser-chunker-${{ github.ref_name }}-${{ matrix.target }}
          path: dist/parser-chunker-*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.sha256" \) -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
