name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
          - target: x86_64-apple-darwin
            os: macos-13
            cross: false
          - target: aarch64-apple-darwin
            os: macos-14
            cross: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: clippy

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Run tests
        if: "!matrix.cross"
        run: cargo test --all --target ${{ matrix.target }}

      - name: Run tests (cross)
        if: matrix.cross
        run: cross test --all --target ${{ matrix.target }}

      - name: Run clippy
        if: "!matrix.cross"
        run: cargo clippy --all-targets --target ${{ matrix.target }} -- -D warnings

      - name: Run clippy (cross)
        if: matrix.cross
        run: cross clippy --all-targets --target ${{ matrix.target }} -- -D warnings

      - name: Build release
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build release (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: parser-chunker-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/parser-chunker
            target/${{ matrix.target }}/release/parser-chunker.exe
          if-no-files-found: ignore
