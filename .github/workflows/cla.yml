name: CLA

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    name: CLA Check
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA' || github.event_name == 'pull_request_target')
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.CLA_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_TOKEN }}
        with:
          path-to-document: 'https://github.com/alessandrobenigni/Lightining-Parser-Chunker-Rust-WASM-CLI/blob/main/CLA.md'
          branch: 'main'
          allowlist: alessandrobenigni,dependabot[bot]
          remote-organization-name: false
          remote-repository-name: false
          create-file-commit-message: 'chore: create CLA signature file'
          signed-commit-message: '$contributorName has signed the CLA in $pullRequestNo'
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can merge this PR, you need to sign the [Contributor License Agreement](https://github.com/alessandrobenigni/Lightining-Parser-Chunker-Rust-WASM-CLI/blob/main/CLA.md).

            This is required because Lightning Parser Chunker uses a dual-license model (AGPL-3.0 + commercial). The CLA grants the project owner the right to offer commercial licenses.

            **To sign, please comment on this PR with exactly:**

            ```
            I have read the CLA Document and I hereby sign the CLA
            ```

            You only need to sign once — it applies to all future contributions.
          custom-allsigned-prcomment: |
            All contributors have signed the CLA. Thank you! ✓
          lock-pullrequest-aftermerge: false
